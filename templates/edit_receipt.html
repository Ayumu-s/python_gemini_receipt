<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レシート編集</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-lg font-bold text-gray-800 hover:text-blue-600">経費管理アプリ</a>
            <button id="navToggle" class="md:hidden p-1 text-gray-500 hover:text-gray-700" aria-label="メニュー">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <div class="hidden md:flex items-center gap-4 text-sm">
                <a href="/receipts" class="text-gray-500 hover:text-blue-600 font-medium">一覧</a>
                <a href="/summary" class="text-gray-500 hover:text-blue-600 font-medium">集計</a>
                <form method="post" action="/logout" class="inline">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button type="submit" class="text-gray-500 hover:text-red-600 font-medium">ログアウト</button>
                </form>
            </div>
        </div>
        <div id="mobileMenu" class="hidden border-t border-gray-100 px-4 py-3 space-y-1 md:hidden">
            <a href="/receipts" class="block py-2 text-sm text-gray-500 hover:text-blue-600 font-medium">一覧</a>
            <a href="/summary" class="block py-2 text-sm text-gray-500 hover:text-blue-600 font-medium">集計</a>
            <form method="post" action="/logout" class="border-t border-gray-100 pt-2 mt-1">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <button type="submit" class="block w-full text-left py-2 text-sm text-gray-500 hover:text-red-600 font-medium">ログアウト</button>
            </form>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-10">
        <h1 class="text-2xl font-bold text-gray-800 mb-8">レシート編集</h1>

        <div class="flex flex-col lg:flex-row gap-6">

            <!-- 画像プレビュー -->
            <div class="lg:w-64 flex-shrink-0">
                <p class="text-sm font-medium text-gray-500 mb-2">レシート画像</p>
                <div class="bg-white border border-gray-200 rounded-2xl p-3 shadow-sm">
                    <img src="/receipts/{{ receipt.id }}/image"
                        alt="{{ receipt.filename }}"
                        class="w-full object-contain rounded-lg max-h-96">
                </div>
                <p class="text-xs text-gray-400 mt-2 text-center">{{ receipt.filename }}</p>
            </div>

            <!-- 編集フォーム -->
            <div class="flex-1">
                <form method="post" action="/receipts/{{ receipt.id }}/edit">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <p class="text-sm font-medium text-gray-500 mb-2">解析テキスト（直接編集できます）</p>
                    <textarea
                        name="result"
                        rows="20"
                        class="w-full font-mono text-sm bg-white border border-gray-200 rounded-2xl p-4 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent leading-relaxed resize-y"
                    >{{ receipt.result }}</textarea>

                    <div class="mt-4 flex gap-3">
                        <button type="submit"
                            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5 rounded-xl transition-colors">
                            保存する
                        </button>
                        <a href="/receipts"
                            class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-6 py-2.5 rounded-xl transition-colors">
                            キャンセル
                        </a>
                    </div>
                </form>
            </div>

        </div>
    </main>

    <script>
        document.getElementById('navToggle')?.addEventListener('click', () => {
            document.getElementById('mobileMenu').classList.toggle('hidden');
        });
    </script>
</body>
</html>
